@if (isOpen()) {
  <div class="modal-backdrop modal-backdrop-overlay" (click)="closeModal()"></div>
  <div class="modal modal-container">
    <div class="modal-dialog modal-dialog-centered modal-dialog-login">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header modal-header-login">
          <h5 class="modal-title mb-0">Login</h5>
          <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"></button>
        </div>
        <div class="modal-body modal-body-login">
          <form (ngSubmit)="login()">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" [(ngModel)]="username" name="username" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" required>
            </div>

            @if (errorMessage()) {
              <div class="alert alert-danger" role="alert">
                {{ errorMessage() }}
              </div>
            }

            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
              <button type="submit" class="btn btn-primary">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
}
