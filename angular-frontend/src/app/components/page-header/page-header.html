<!-- Toast -->
@if (toastService.toast(); as toast) {
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div class="toast show" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header"
      [ngClass]="{
        'text-bg-success': toast.type === 'success',
        'text-bg-warning': toast.type === 'warning',
        'text-bg-danger': toast.type === 'danger',
        'text-bg-info': toast.type === 'info'
      }">
      <strong class="me-auto">
        {{ toast.title }}
      </strong>
      <button type="button" class="btn-close" [class.btn-close-white]="toast.type !== 'warning'" (click)="closeToast()">
      </button>
    </div>
    <div class="toast-body">
      {{ toast.message }}
    </div>
  </div>
</div>
}

<div class="page-header d-flex align-items-center px-4" [class.page-header-no-border]="breadcrumb || hideBorder">
  <!-- Left: logo + title (links back to the homepage) -->
  <a class="d-flex align-items-center gap-2 header-brand" routerLink="/applications">
    <i class="fa-solid fa-globe header-globe-icon"></i>
    <div class="d-flex flex-column">
      <span class="header-title">Integration catalog</span>
      <span class="header-subtitle">by Evolveum</span>
    </div>
  </a>

  <!-- Right: user info or login -->
  <div class="ms-auto d-flex align-items-center gap-3">
    <!-- Tasks & Notifications (placeholders, hidden for now - to be enabled later) -->
    <!--
    <button class="header-icon-btn" type="button" title="Tasks">
      <i class="fa-regular fa-clipboard"></i>
      <span class="header-icon-badge">3</span>
    </button>
    <button class="header-icon-btn" type="button" title="Notifications">
      <i class="fa-regular fa-bell"></i>
    </button>

    <div class="header-divider"></div>
    -->


    @if (currentUser()) {
      <button class="header-user d-flex align-items-center gap-2" (click)="logout()" title="Logout">
        <i class="fa-solid fa-user header-user-icon"></i>
        <div class="d-flex flex-column text-start">
          <span class="header-username">{{ currentUser() }}</span>
          <span class="header-role">({{ authService.currentRole() }})</span>
        </div>
        <i class="fa-solid fa-chevron-down header-chevron"></i>
      </button>
    } @else {
      <button class="header-btn-login d-flex align-items-center gap-2" (click)="openLoginModal()">
        <i class="fa-solid fa-user header-user-icon"></i>
        <span>Login</span>
      </button>
    }
  </div>
</div>

@if (breadcrumb) {
  <div class="page-header-breadcrumb px-4">
    <ng-content select="[breadcrumb]"></ng-content>
  </div>
}

<app-login-modal [isOpen]="loginModalOpen()" (modalClosed)="closeLoginModal()"></app-login-modal>
