spring.application.name=integration-catalog

# PostgreSQL database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/integrationCatalog
spring.datasource.username=integration_catalog
spring.datasource.password=WJzesbe3poNZ91qIbmR7
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configurations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging configuration file (Logback). Levels/appenders/patterns live in log4j.xml.
logging.config=classpath:log4j.xml

# Render the startup banner (banner.txt) through the logging system instead of
# straight to stdout, so it is written at the top of the log file. It still shows
# in the terminal too, because the console appender is attached during startup.
spring.main.banner-mode=log

# GitHub client
github.apiToken=
github.groupPath=
github.templatePath=

# Jenkins client
jenkins.url=
jenkins.username=
jenkins.apiToken=

# server port
server.port=8080

# Surface exception messages (e.g. ResponseStatusException reasons) in error responses.
# Default since Spring Boot 2.3 is "never", which hides the useful upload-conflict details.
server.error.include-message=always

# Logo storage configuration
logo.storage.base-path=./integration-catalog/data/logos
logo.storage.max-size-bytes=5242880

# Tutorial storage configuration
tutorial.storage.base-path=./integration-catalog/data/tutorials
tutorial.storage.max-size-bytes=20971520

# Multipart upload limits (defaults are 1MB/10MB; raise to match tutorial.storage.max-size-bytes)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
